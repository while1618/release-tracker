server:
  port: ${API_PORT:8080}
spring:
  application:
    name: releasetracker
  sql:
    init:
      platform: postgres
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DATABASE:release-tracker}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      jakarta:
        persistence:
          validation:
            mode: none
      hibernate:
        query:
          fail_on_pagination_over_collection_fetch: true
    open-in-view: false
